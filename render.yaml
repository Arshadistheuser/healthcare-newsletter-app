services:
  - type: web
    name: healthcare-newsletter-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: USE_OLLAMA
        value: false
      - key: DEBUG
        value: false
